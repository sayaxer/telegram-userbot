services:
  - type: pserv
    name: telegram-userbot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python userbot.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: PHONE_NUMBER
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
